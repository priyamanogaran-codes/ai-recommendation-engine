<!DOCTYPE html>
<html>

<head>

<title>Velora AI</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="chat-container">

<h1>🤖 Velora AI Assistant</h1>

<div class="chat-box">

{% if reply %}

<p>

<b>🤖 AI:</b>

{{ reply }}

</p>

{% endif %}

</div>

<form method="POST">

<input
type="text"
name="message"
placeholder="Ask something..."
required>

<button>

Send

</button>

</form>

</div>

</body>

</html>

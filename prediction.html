<div class="prediction-box">

<h1>Purchase Prediction</h1>

<form method="POST">

<input type="number" name="age" placeholder="Age" required>

<input type="number" name="income" placeholder="Income" required>

<input type="number" name="previous" placeholder="Previous Purchases" required>

<input type="number" name="time" placeholder="Time Spent" required>

<button type="submit">Predict</button>

</form>

{% if result %}

<h2>{{ result }}</h2>

{% endif %}

</div>

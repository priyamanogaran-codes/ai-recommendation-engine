<!DOCTYPE html>
<html>

<head>

    <title>Velora | Admin Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/admin.css') }}">

</head>

<body>

<div class="admin-login">

    <h1>🛍️ Velora Admin</h1>

    <h3>Administrator Login</h3>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Admin Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">

            Login

        </button>

    </form>

    <p style="color:red;">

        {{ message }}

    </p>

</div>

</body>

</html>
